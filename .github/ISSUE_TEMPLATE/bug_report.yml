name: Bug Report
description: Report something that is not working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - blocker
        - major
        - minor
        - cosmetic
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Device, build type, commit, and relevant setup.
