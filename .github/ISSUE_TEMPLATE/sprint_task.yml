name: Sprint Task
description: A scoped unit of work for the approved current sprint
title: "[Sprint 000] "
labels: ["sprint"]
body:
  - type: markdown
    attributes:
      value: |
        Sprint tasks must be approved by the Founder before OpenClaw implements them.
  - type: input
    id: sprint
    attributes:
      label: Sprint
      description: Sprint number, for example Sprint 001.
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: One clear sentence describing the work.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Measurable outcomes that define done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: What OpenClaw must not build.
    validations:
      required: true
  - type: input
    id: founder_approval
    attributes:
      label: Founder Approval
      description: Link to the approval source.
    validations:
      required: true
